# Feature List
features                                  :

  - title: Real-Time Updates
    description: Bloom Partner refreshes automatically whenever she logs. Always see the latest snapshot — no manual syncing, no delays.
    fontawesome_icon_name: sync

  - title: Cycle & Fertility View
    description: See her current phase, fertile window, and ovulation day at a glance. Know when she needs extra support or space.
    fontawesome_icon_name: heart

  - title: Pregnancy Dashboard
    description: Week by week — baby size, trimester, due date countdown, and upcoming appointments. Be present for every milestone.
    fontawesome_icon_name: baby

  - title: Postpartum Support
    description: Track feeding sessions, mood check-ins, and 12-week recovery progress. Know how she and baby are really doing after birth.
    fontawesome_icon_name: home

  - title: Partner Notifications
    description: Get notified when her period starts, ovulation day arrives, a new pregnancy week begins, or mood needs attention.
    fontawesome_icon_name: bell

  - title: Private by Design
    description: She controls what's shared via a 6-character code. Her data never leaves her device — you only see what she chooses to share.
    fontawesome_icon_name: lock



