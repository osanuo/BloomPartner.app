# Feature List
features                                  :

  - title: Cycle Tracking
    description: Log your period, symptoms, mood, and energy daily. Bloom predicts your next cycle, fertile window, and each phase — Menstrual, Follicular, Ovulation, and Luteal.
    fontawesome_icon_name: heart

  - title: TTC — Trying to Conceive
    description: Know your peak fertility days. Bloom highlights your fertile window and ovulation day, tracks BBT, and monitors LH surge data to maximise your chances.
    fontawesome_icon_name: seedling

  - title: Pregnancy Tracker
    description: Week-by-week pregnancy companion. See your baby's size, trimester milestones, kick counter, contraction timer, weight chart, and days until your due date.
    fontawesome_icon_name: baby

  - title: Postpartum Recovery
    description: Track your 12-week recovery, log feeding sessions, monitor sleep fragmentation, and check in on your mood — because your health matters after birth too.
    fontawesome_icon_name: home

  - title: Health Insights
    description: Cycle length history, mood & energy patterns, hormone phase science, feeding analytics, and a personal Health Score that improves as you log consistently.
    fontawesome_icon_name: chart-bar

  - title: Private by Design
    description: All data lives on your device with optional iCloud sync. No account required. No ads. No tracking. What you log stays yours.
    fontawesome_icon_name: lock



